apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rag-platform
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.11.x
    helm:
      values: |
        config:
          gitCommitUser: argocd-image-updater
          gitCommitMail: argocd@nawex.com
          gitCommitTemplate: |
            chore(images): bump {{ range .AppChanges -}}
            {{ .Image }}:{{ .NewTag }} {{ end }} for dev-eks
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
