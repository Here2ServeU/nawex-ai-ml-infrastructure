apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-platform-staging-gke
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rag-platform
  source:
    repoURL: https://github.com/nawex/nawex-ai-ml-infrastructure
    targetRevision: main
    path: argocd/clusters/staging-gke
    directory:
      recurse: false
      include: '{apps.yaml,infrastructure.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
