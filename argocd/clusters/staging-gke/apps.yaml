apiVersion: v1
kind: Namespace
metadata: { name: rag, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: v1
kind: Namespace
metadata: { name: ingest, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: v1
kind: Namespace
metadata: { name: qdrant, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vector-db-staging
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: rag-platform
  source:
    repoURL: https://github.com/nawex/nawex-ai-ml-infrastructure
    targetRevision: main
    path: helm/charts/vector-db
    helm:
      values: |
        replicaCount: 3
        storage:
          size: 100Gi
          storageClass: standard-rwo
  destination: { server: https://kubernetes.default.svc, namespace: qdrant }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-api-staging
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: rag-api=ghcr.io/nawex/rag-api
    argocd-image-updater.argoproj.io/rag-api.update-strategy: semver
    argocd-image-updater.argoproj.io/rag-api.allow-tags: regexp:^v0\..*$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: rag-platform
  source:
    repoURL: https://github.com/nawex/nawex-ai-ml-infrastructure
    targetRevision: main
    path: helm/charts/rag-api
    helm:
      values: |
        image:
          repository: ghcr.io/nawex/rag-api
          tag: v0.1.0
        autoscaling:
          minReplicas: 5
          maxReplicas: 30
        ingress:
          hosts:
            - host: rag-api.staging.example.com
              paths: [{ path: /, pathType: Prefix }]
          tls: [{ secretName: rag-api-tls, hosts: [rag-api.staging.example.com] }]
  destination: { server: https://kubernetes.default.svc, namespace: rag }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingest-worker-staging
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: ingest-worker=ghcr.io/nawex/ingest-worker
    argocd-image-updater.argoproj.io/ingest-worker.update-strategy: semver
    argocd-image-updater.argoproj.io/ingest-worker.allow-tags: regexp:^v0\..*$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: rag-platform
  source:
    repoURL: https://github.com/nawex/nawex-ai-ml-infrastructure
    targetRevision: main
    path: helm/charts/ingest-worker
    helm:
      values: |
        image:
          repository: ghcr.io/nawex/ingest-worker
          tag: v0.1.0
  destination: { server: https://kubernetes.default.svc, namespace: ingest }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
