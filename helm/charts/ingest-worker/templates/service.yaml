apiVersion: v1
kind: Service
metadata:
  name: {{ include "ingest-worker.fullname" . }}
  labels: {{- include "ingest-worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
  selector: {{- include "ingest-worker.selectorLabels" . | nindent 4 }}
