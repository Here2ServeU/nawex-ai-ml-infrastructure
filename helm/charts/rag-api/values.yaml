image:
  repository: ghcr.io/your-org/rag-api
  tag: ""        # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: rag-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: rag-api-tls
      hosts:
        - rag-api.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# RAG-specific configuration; rendered into the ConfigMap.
config:
  logLevel: info
  vectorDB:
    address: qdrant.qdrant.svc.cluster.local:6334
    collection: documents
  embedder:
    endpoint: http://embedder.ml.svc.cluster.local/embed
    timeoutMs: 1500
  retrieval:
    topK: 8
    contextTokens: 4096

# Service account: bind to a cloud identity via IRSA / Workload Identity.
serviceAccount:
  create: true
  name: ""
  annotations: {}
    # AWS:   eks.amazonaws.com/role-arn: arn:aws:iam::123:role/rag-api
    # GCP:   iam.gke.io/gcp-service-account: rag-api@PROJECT.iam.gserviceaccount.com
    # Azure: azure.workload.identity/client-id: <client-id>

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels: {}

prometheusRule:
  enabled: true
  labels: {}

networkPolicy:
  enabled: true
  # Namespaces allowed to call the API (typically the ingress namespace).
  ingressFromNamespaces:
    - ingress-nginx
  # Egress destinations the API needs.
  egressToNamespaces:
    - qdrant
    - ml
    - observability

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: rag-api
          topologyKey: topology.kubernetes.io/zone
