{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vector-db.fullname" . }}
  labels: {{- include "vector-db.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "vector-db.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - port: {{ .Values.service.ports.http }}
          protocol: TCP
        - port: {{ .Values.service.ports.grpc }}
          protocol: TCP
{{- end }}
