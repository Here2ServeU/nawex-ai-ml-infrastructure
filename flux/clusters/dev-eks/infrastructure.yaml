apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sources
  namespace: flux-system
spec:
  interval: 30m
  retryInterval: 2m
  path: ./flux/infrastructure/sources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  dependsOn:
    - { name: infra-sources }
  interval: 30m
  retryInterval: 2m
  path: ./flux/infrastructure/controllers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-observability
  namespace: flux-system
spec:
  dependsOn:
    - { name: infra-controllers }
  interval: 30m
  retryInterval: 2m
  path: ./flux/infrastructure/observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
