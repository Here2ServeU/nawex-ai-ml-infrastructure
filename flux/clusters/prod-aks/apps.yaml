apiVersion: v1
kind: Namespace
metadata: { name: rag, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: v1
kind: Namespace
metadata: { name: ingest, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: v1
kind: Namespace
metadata: { name: qdrant, labels: { pod-security.kubernetes.io/enforce: restricted } }
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: vector-db, namespace: qdrant }
spec:
  interval: 10m
  chart:
    spec:
      chart: ./helm/charts/vector-db
      sourceRef: { kind: GitRepository, name: flux-system, namespace: flux-system }
  values:
    replicaCount: 5
    storage: { size: 500Gi, storageClass: managed-csi-premium }
    resources:
      requests: { cpu: "2", memory: "8Gi" }
      limits:   { cpu: "8", memory: "32Gi" }
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: rag-api, namespace: rag }
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/charts/rag-api
      sourceRef: { kind: GitRepository, name: flux-system, namespace: flux-system }
  values:
    image: { repository: ghcr.io/nawex/rag-api, tag: v1.0.0 }
    autoscaling: { minReplicas: 10, maxReplicas: 60 }
    pdb: { enabled: true, minAvailable: "60%" }
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: "4",  memory: "2Gi" }
    ingress:
      hosts:
        - host: rag-api.example.com
          paths: [{ path: /, pathType: Prefix }]
      tls: [{ secretName: rag-api-tls, hosts: [rag-api.example.com] }]
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: ingest-worker, namespace: ingest }
spec:
  interval: 5m
  chart:
    spec:
      chart: ./helm/charts/ingest-worker
      sourceRef: { kind: GitRepository, name: flux-system, namespace: flux-system }
  values:
    image: { repository: ghcr.io/nawex/ingest-worker, tag: v1.0.0 }
    keda:
      minReplicaCount: 3
      maxReplicaCount: 100
